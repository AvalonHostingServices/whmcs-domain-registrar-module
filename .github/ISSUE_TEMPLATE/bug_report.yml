name: Bug report
description: Report a reproducible bug in the WHMCS module
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue.
  - type: input
    id: version
    attributes:
      label: Module version
      description: "Example: v2.0.1"
      placeholder: v2.0.1
    validations:
      required: true
  - type: input
    id: whmcs_version
    attributes:
      label: WHMCS version
      placeholder: 8.x.x
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps to reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove sensitive information before posting.
